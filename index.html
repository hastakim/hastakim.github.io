<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal Analysis</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Segoe UI", Arial, sans-serif; background: #0f0f0f; color: #e0e0e0; line-height: 1.7; }

/* LOGIN */
#login-overlay {
  position: fixed; inset: 0; background: #0a0a0a;
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
#login-box {
  background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px;
  padding: 40px 36px; width: 340px; max-width: 92vw; text-align: center;
}
#login-box h2 { color: #fff; font-size: 1.2rem; margin-bottom: 6px; }
#login-box p  { color: #666; font-size: 0.82rem; margin-bottom: 24px; }
#login-box label { display: block; text-align: left; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
#login-box input {
  width: 100%; background: #111; border: 1px solid #333; border-radius: 5px;
  color: #e0e0e0; padding: 10px 12px; font-size: 0.93rem; margin-bottom: 16px; outline: none;
  transition: border-color .2s;
}
#login-box input:focus { border-color: #e74c3c; }
#login-btn {
  width: 100%; padding: 11px; background: #e74c3c; border: none; border-radius: 5px;
  color: #fff; font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: background .2s;
}
#login-btn:hover { background: #c0392b; }
#login-error { color: #e74c3c; font-size: 0.82rem; margin-top: 12px; min-height: 18px; }
#lock-icon { font-size: 2.5rem; margin-bottom: 16px; }

/* DECRYPTING STATE */
#decrypt-status {
  display: none; position: fixed; inset: 0; background: #0a0a0a;
  align-items: center; justify-content: center; flex-direction: column;
  z-index: 9998; color: #aaa; font-size: 0.9rem; gap: 16px;
}
.spinner {
  width: 36px; height: 36px; border: 3px solid #333;
  border-top-color: #e74c3c; border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* MAIN */
#main-content { display: none; padding: 24px; max-width: 960px; margin: 0 auto; }

/* TABS */
#tab-nav {
  position: sticky; top: 0; z-index: 100;
  background: #0f0f0f; border-bottom: 2px solid #1a1a1a;
  display: flex; flex-wrap: wrap; gap: 4px; padding: 10px 0 0 0; margin-bottom: 28px;
}
.tab-btn {
  background: #1a1a1a; border: 1px solid #2a2a2a; border-bottom: none;
  color: #aaa; padding: 8px 16px; border-radius: 6px 6px 0 0;
  cursor: pointer; font-size: 0.82rem; transition: all .2s; white-space: nowrap;
}
.tab-btn:hover { background: #222; color: #fff; }
.tab-btn.active { background: #e74c3c; border-color: #e74c3c; color: #fff; }
.tab-btn#tab-all { background: #1e1e1e; color: #f39c12; }
.tab-btn#tab-all.active { background: #f39c12; color: #111; border-color: #f39c12; }
.part-section { display: none; }
.part-section.active { display: block; }

/* CONTENT STYLES */
h1 { font-size: 1.5rem; color: #fff; border-bottom: 2px solid #e74c3c; padding-bottom: 10px; margin-bottom: 24px; }
h2 { font-size: 1.05rem; color: #e74c3c; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
h3 { font-size: 0.95rem; color: #f39c12; margin: 14px 0 4px 0; }
.section { background: #1a1a1a; border-left: 4px solid #e74c3c; border-radius: 6px; padding: 18px 20px; margin-bottom: 20px; }
.problem  { background: #1e1212; border-left: 4px solid #c0392b; }
.solution { background: #121e12; border-left: 4px solid #27ae60; }
.warning  { background: #1e1a10; border-left: 4px solid #f39c12; }
.insight  { background: #12121e; border-left: 4px solid #8e44ad; }
.new      { background: #121a1a; border-left: 4px solid #16a085; }
.final    { background: #0d1a0d; border-left: 4px solid #27ae60; }
p  { margin-bottom: 8px; font-size: 0.93rem; }
ul { padding-left: 18px; margin-bottom: 8px; }
ol { padding-left: 18px; margin-bottom: 8px; }
li { font-size: 0.92rem; margin-bottom: 5px; }
.tag { display: inline-block; background: #2c2c2c; color: #aaa; font-size: 0.75rem; padding: 2px 8px; border-radius: 12px; margin-bottom: 10px; }
hr  { border: none; border-top: 1px solid #2a2a2a; margin: 24px 0; }
.callout     { background: #1a1a2e; border: 1px solid #8e44ad; border-radius: 6px; padding: 14px 18px; margin: 12px 0; font-size: 0.9rem; color: #ccc; }
.red-callout { background: #1e1010; border: 1px solid #e74c3c; border-radius: 6px; padding: 14px 18px; margin: 12px 0; font-size: 0.9rem; }
.time-log    { background: #111; border: 1px solid #2a2a2a; border-radius: 4px; padding: 12px 16px; margin: 10px 0; font-family: monospace; font-size: 0.82rem; color: #aaa; line-height: 1.9; }
table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 0.88rem; }
th { background: #1e1e1e; color: #e74c3c; text-align: left; padding: 8px 12px; border-bottom: 2px solid #333; }
td { padding: 8px 12px; border-bottom: 1px solid #222; vertical-align: top; }
tr:nth-child(even) td { background: #161616; }
.number { font-size: 2rem; font-weight: bold; color: #e74c3c; display: block; margin-bottom: 2px; }
.stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin: 16px 0; }
.stat-box  { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 14px; text-align: center; }
.part-divider { border: none; border-top: 3px solid #e74c3c; margin: 40px 0 24px 0; }
.part-label { background: #e74c3c; color: #fff; font-size: 0.78rem; font-weight: bold; padding: 3px 14px; border-radius: 12px; display: inline-block; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 20px; }

/* CONTROLS */
#logout-btn {
  position: fixed; bottom: 18px; right: 18px;
  background: #1a1a1a; border: 1px solid #333; color: #aaa;
  padding: 7px 16px; border-radius: 20px; font-size: 0.78rem;
  cursor: pointer; z-index: 200; transition: all .2s;
}
#logout-btn:hover { background: #e74c3c; color: #fff; border-color: #e74c3c; }
#scroll-top {
  position: fixed; bottom: 18px; left: 18px;
  background: #1a1a1a; border: 1px solid #333; color: #aaa;
  width: 38px; height: 38px; border-radius: 50%; font-size: 1rem;
  cursor: pointer; z-index: 200; transition: all .2s;
  display: flex; align-items: center; justify-content: center;
}
#scroll-top:hover { background: #333; color: #fff; }
@media(max-width:600px){
  .stat-grid { grid-template-columns: 1fr 1fr; }
  #main-content { padding: 14px; }
  .tab-btn { font-size: 0.75rem; padding: 7px 10px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-overlay">
  <div id="login-box">
    <div id="lock-icon">🔒</div>
    <h2>Private Journal</h2>
    <p>Protected content. Enter credentials to decrypt.</p>
    <label for="u-input">Username</label>
    <input type="text" id="u-input" autocomplete="off" spellcheck="false">
    <label for="p-input">Password</label>
    <input type="password" id="p-input" autocomplete="off">
    <button id="login-btn" onclick="attemptDecrypt()">Unlock</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- DECRYPTING SPINNER -->
<div id="decrypt-status" style="display:none; position:fixed; inset:0; background:#0a0a0a; align-items:center; justify-content:center; flex-direction:column; z-index:9998; color:#aaa; font-size:0.9rem; gap:16px;">
  <div class="spinner"></div>
  <span>Decrypting...</span>
</div>

<!-- MAIN (populated after decryption) -->
<div id="main-content">
  <button id="logout-btn" onclick="logout()">🔒 Lock</button>
  <button id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
  <div id="content-area"></div>
</div>

// ── CRYPTO HELPERS ──
function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function deriveKey(password, username, salt) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey(
    "raw", enc.encode(password + username), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 200000, hash: "SHA-256" },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function decryptPayload(password, username) {
  const raw = b64ToBytes(PAYLOAD);
  // Layout: salt(16) + iv(12) + tag(16) + ciphertext
  const salt       = raw.slice(0, 16);
  const iv         = raw.slice(16, 28);
  const tag        = raw.slice(28, 44);
  const ciphertext = raw.slice(44);

  // AES-GCM needs ciphertext + tag concatenated
  const ciphertextWithTag = new Uint8Array(ciphertext.length + tag.length);
  ciphertextWithTag.set(ciphertext);
  ciphertextWithTag.set(tag, ciphertext.length);

  const key = await deriveKey(password, username, salt);
  const decrypted = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv },
    key,
    ciphertextWithTag
  );
  return new TextDecoder().decode(decrypted);
}

// ── LOGIN + DECRYPT ──
async function attemptDecrypt() {
  const u   = document.getElementById("u-input").value.trim();
  const p   = document.getElementById("p-input").value;
  const err = document.getElementById("login-error");
  const btn = document.getElementById("login-btn");

  if (!u || !p) { err.textContent = "Enter both fields."; return; }

  btn.textContent = "Decrypting...";
  btn.disabled = true;
  err.textContent = "";

  // Show spinner, hide login
  document.getElementById("login-overlay").style.display = "none";
  const spinner = document.getElementById("decrypt-status");
  spinner.style.display = "flex";

  try {
    const html = await decryptPayload(p, u);
    spinner.style.display = "none";
    document.getElementById("content-area").innerHTML = html;
    document.getElementById("main-content").style.display = "block";
    sessionStorage.setItem("jauth_u", u);
    sessionStorage.setItem("jauth_p", p);
    initTabs();
  } catch (e) {
    // Wrong credentials = decryption fails
    spinner.style.display = "none";
    document.getElementById("login-overlay").style.display = "flex";
    err.textContent = "Incorrect username or password.";
    document.getElementById("p-input").value = "";
    btn.textContent = "Unlock";
    btn.disabled = false;
  }
}

function logout() {
  sessionStorage.removeItem("jauth_u");
  sessionStorage.removeItem("jauth_p");
  document.getElementById("content-area").innerHTML = "";
  document.getElementById("main-content").style.display = "none";
  document.getElementById("login-overlay").style.display = "flex";
  document.getElementById("u-input").value = "";
  document.getElementById("p-input").value = "";
  document.getElementById("login-error").textContent = "";
}

// ── TABS (called after content injected) ──
function showTab(num) {
  document.querySelectorAll(".part-section").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  if (num === "all") {
    document.getElementById("section-all").classList.add("active");
    document.getElementById("tab-all").classList.add("active");
  } else {
    document.getElementById("section-" + num).classList.add("active");
    document.getElementById("tab-" + num).classList.add("active");
  }
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function initTabs() {
  const s1 = document.getElementById("section-1");
  if (s1) s1.classList.add("active");
  const t1 = document.getElementById("tab-1");
  if (t1) t1.classList.add("active");
}

// Enter key support
document.addEventListener("keydown", e => {
  if (e.key === "Enter" &&
      document.getElementById("login-overlay").style.display !== "none") {
    attemptDecrypt();
  }
});

// Restore session (same browser tab session)
(async () => {
  const u = sessionStorage.getItem("jauth_u");
  const p = sessionStorage.getItem("jauth_p");
  if (u && p) {
    document.getElementById("login-overlay").style.display = "none";
    const spinner = document.getElementById("decrypt-status");
    spinner.style.display = "flex";
    try {
      const html = await decryptPayload(p, u);
      spinner.style.display = "none";
      document.getElementById("content-area").innerHTML = html;
      document.getElementById("main-content").style.display = "block";
      initTabs();
    } catch {
      spinner.style.display = "none";
      sessionStorage.clear();
      document.getElementById("login-overlay").style.display = "flex";
    }
  }
})();
</script>
